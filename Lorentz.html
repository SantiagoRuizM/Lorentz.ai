<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorentz.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Primary ── */
      --violet:        #6E54FF;
      --violet-bright: #9B8AFF;
      --violet-deep:   #5240CC;
      --violet-20:     rgba(110,84,255,0.20);
      --violet-10:     rgba(110,84,255,0.10);
      --violet-06:     rgba(110,84,255,0.06);

      /* ── Surfaces ── */
      --void:    #07070E;
      --deep:    #0C0C1A;
      --slate:   #131326;
      --card:    #191932;
      --surface: #20203E;

      /* ── Borders ── */
      --border:        #262645;
      --border-subtle: #1A1A32;
      --border-active: #6E54FF;

      /* ── Text ── */
      --text:       #ECEEF8;
      --text-muted: #8888B0;
      --text-dim:   #44446A;

      /* ── Signals ── */
      --success: #4DECAA;
      --warn:    #FFB84D;
      --error:   #FF5C5C;

      /* ── Golden ratio spacing (φ = 1.618) ── */
      --s1:  8px;
      --s2:  13px;
      --s3:  21px;
      --s4:  34px;
      --s5:  55px;
      --s6:  89px;
      --s7:  144px;
    }

    html, body, #root {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--void);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--violet-deep); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes nodeAppear {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      from { background-position: -400px 0; }
      to   { background-position: 400px 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fade-up { animation: fadeUp 0.35s cubic-bezier(0.25,0,0.35,1) both; }

    /* Utility */
    .mono { font-family: 'JetBrains Mono', monospace; }
    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Graph.jsx"></script>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/Topbar.jsx"></script>
  <script type="text/babel" src="components/RainbowKitModal.jsx"></script>
  <script type="text/babel" src="screens/Revisor.jsx"></script>
  <script type="text/babel" src="screens/Login.jsx"></script>
  <script type="text/babel" src="screens/GraphScreen.jsx"></script>
  <script type="text/babel" src="screens/Synaptrac.jsx"></script>
  <script type="text/babel" src="screens/KMerge.jsx"></script>
  <script type="text/babel" src="screens/Discursus.jsx"></script>
  <script type="text/babel" src="screens/Professor.jsx"></script>
  <script type="text/babel" src="screens/Axiom.jsx"></script>
  <script type="text/babel" src="screens/Profile.jsx"></script>
  <script type="text/babel" src="screens/Achievements.jsx"></script>
  <script type="text/babel" src="screens/Deploy.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
